name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT: dmjone
  REGION: asia-east1
  SERVICE: biovault

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}

      - name: Deploy
        env:
          SVC: ${{ env.SERVICE }}
          REG: ${{ env.REGION }}
        run: |
          gcloud run deploy "$SVC" \
            --source . \
            --region "$REG" \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --cpu 1 --memory 512Mi \
            --concurrency 40 --port 8080 \
            --set-env-vars "LOG_LEVEL=INFO,CLOUD_RUN_REGION=$REG" \
            --quiet
          gcloud run services describe "$SVC" --region "$REG" --format='value(status.url)'
